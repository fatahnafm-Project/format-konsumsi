<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Format PANJIMAS 2026</title>
    <!-- Script untuk konversi HTML ke Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --gray: #f4f4f4; }
        body { font-family: 'Arial', sans-serif; background: var(--gray); margin: 0; padding: 20px; }
        
        /* Navigasi */
        .nav-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .nav-btn { padding: 10px 15px; border: none; background: white; cursor: pointer; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* Area Kerja */
        .workspace { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .canvas-wrapper { background: white; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.1); border: 1px solid #ddd; width: 800px; min-height: 1000px; }
        
        /* Style Tabel Persis Seperti Excel */
        .format-header { text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; font-size: 14px; }
        th { background-color: #f2f2f2; text-align: center; }
        .editable { outline: none; background: #fffdf0; }
        .editable:focus { background: #fff; border: 1px solid blue; }

        /* Tombol Aksi */
        .action-bar { position: sticky; top: 0; background: var(--gray); padding: 10px; z-index: 100; display: flex; gap: 10px; }
        .download-btn { background: var(--secondary); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="action-bar">
        <button class="download-btn" onclick="downloadImage()">⬇️ Download Sebagai JPG</button>
    </div>

    <div class="nav-container" id="navBar">
        <!-- Button akan dibuat otomatis oleh JS -->
    </div>

    <div id="captureArea" class="canvas-wrapper">
        <div id="formatContent">
            <!-- Konten tabel akan berubah di sini -->
        </div>
    </div>
</div>

<script>
    // Data Struktur Format (Contoh untuk Format 1 & 2)
    // Kamu bisa menambahakan template format lainnya di sini
    const formats = {
        1: {
            title: "MENU SNACK HALAL BIHALAL",
            subtitle: "Panitia Ujian Masuk (PANJIMAS) 1447 H / 2026 M",
            headers: ["NO", "MENU", "JUMLAH"],
            rows: [
                ["1", "Pimpinan Pondok", "2"],
                ["2", "Direktur KMI", "2"],
                ["3", "Muwajjih", "7"],
                ["4", "Penguji (Guru Senior)", "35"]
            ]
        },
        2: {
            title: "MENU MAKANAN BERAT PENGUJI",
            subtitle: "Panitia Ujian Masuk 1447 H / 2026 M",
            headers: ["No", "Tanggal", "Pagi (06.30)", "Malam (19.30)"],
            rows: [
                ["1", "26 Maret 2026", "Nasi Ayam Kampung", "Sate Ayam"],
                ["2", "27 Maret 2026", "Nasi Krawu", "Ayam Goreng"]
            ]
        }
        // Tambahkan format 3-9 dengan pola yang sama
    };

    let currentFormat = 1;

    // Fungsi Render Tabel
    function renderFormat(id) {
        currentFormat = id;
        const data = formats[id] || formats[1];
        let html = `
            <div class="format-header">
                <h3 style="margin:0">${data.title}</h3>
                <p style="margin:5px 0">${data.subtitle}</p>
            </div>
            <table>
                <thead>
                    <tr>${data.headers.map(h => `<th>${h}</th>`).join('')}</tr>
                </thead>
                <tbody>
                    ${data.rows.map(row => `
                        <tr>
                            ${row.map(cell => `<td contenteditable="true" class="editable">${cell}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <div style="margin-top:20px; font-size:12px">
                <i>*Klik pada teks untuk mengedit isi tabel secara langsung.</i>
            </div>
        `;
        document.getElementById('formatContent').innerHTML = html;
        
        // Update Active Button
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(id));
        });
    }

    // Buat Navigasi 1-9
    const navBar = document.getElementById('navBar');
    for (let i = 1; i <= 9; i++) {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerText = `Format ${i}`;
        btn.onclick = () => renderFormat(i);
        navBar.appendChild(btn);
    }

    // Fungsi Download JPG
    function downloadImage() {
        const area = document.getElementById('captureArea');
        html2canvas(area, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Format_${currentFormat}_PANJIMAS.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.9);
            link.click();
        });
    }

    // Inisialisasi awal
    renderFormat(1);
</script>

</body>
</html>
